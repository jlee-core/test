<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="css/grid.css" />
    <title>Grid Layout</title>
  </head>
  <body>
    <div class="container">
      <div class="item1">Item 1</div>
      <div class="item2">Item 2</div>
      <div class="item3">Item 3</div>
      <div class="item4">Item 4</div>
      <div class="item5">Item 5</div>
    </div>

    <!-- Gridの練習 -->
    <div class="parent">
      <div class="child11">子要素1</div>
      <div class="child22">子要素2</div>
      <div class="child33">子要素3</div>
    </div>

    <div class="flow">
      <div class="child44">子要素4</div>
      <div class="child55">子要素5</div>
      <div class="child66">子要素6</div>
      <div class="child77">子要素7</div>
    </div>

    <!-- grid-auto-flow, grid-template-columns, grid-template-rowsの練習 -->
    <div class="parent1">
      <div class="child1">子要素1</div>
      <div class="child2">子要素2</div>
      <div class="child3">子要素3</div>
      <div class="child4">子要素4</div>
      <div class="child5">子要素5</div>
    </div>

    <div class="parent2">
      <div class="child6">子要素6</div>
      <div class="child7">子要素7</div>
      <div class="child8">子要素8</div>
      <div class="child9">子要素9</div>
      <div class="child10">子要素10</div>
    </div>
  </body>
</html>
