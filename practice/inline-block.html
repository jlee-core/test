<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>練習問題</title>
    <style>
      p {
        display: inline-block;
        width: 100px;
        height: 50px;
        background-color: #eeeeee;
      }
      sub {
        width: 100px;
        height: 50px;
        background-color: aqua;
      }
    </style>
  </head>
  <body>
    <div>
      <p class="child">要素1</p>
      <p class="child">要素2</p>
      <p class="child">要素3</p>
    </div>
    <div>
      <p class="sub">要素4</p>
      <p class="sub">要素5</p>
      <p class="sub">要素6</p>
    </div>
  </body>
</html>
