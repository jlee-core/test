<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>練習問題</title>
    <link rel="stylesheet" href="css/select-css.css" />
  </head>
  <body>
    <h1>セレクタの使い方を学ぼう</h1>
    <h2>セレクタとは</h2>

    <!-- 問題3. classセレクタへのスタイル適用①【段落】 -->
    <!-- この下に解答してください -->
    <div class="text-wrap">
      <p>「CSSのスタイルをどこに適用するか」を指定するものがセレクタです。</p>
      <p>
        セレクタには<span class="red">要素型・class・id</span
        >など様々な種類があります。
      </p>
    </div>

    <h2>主なセレクタ</h2>
    <ul>
      <!-- 問題5. classセレクタへのスタイル適用②【リスト】 -->
      <!-- この下に解答してください -->
      <li class="card01">要素型</li>
      <li class="card02">class</li>
      <li class="card03">id</li>
    </ul>
  </body>
</html>
