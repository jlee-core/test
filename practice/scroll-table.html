<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/scroll-table.css" />
    <title>練習問題</title>
  </head>
  <body>
    <div class="table-wrap">
      <table class="price-table">
        <thead>
          <tr class="price-tr">
            <th class="price-thead-none"></th>
            <th class="price-thead-th">内容</th>
            <th class="price-thead-th">月額利用料</th>
            <th class="price-thead-th">初期費用</th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <th class="price-tbody-th">フリー</th>
            <td class="price-td">まずは無料で試してみたい方向け</td>
            <td class="price-td" id="free" colspan="2">¥0</td>
          </tr>
          <tr>
            <th class="price-tbody-th">スタンダード</th>
            <td class="price-td">ベーシックなサポート付き</td>
            <td class="price-td">¥5,000</td>
            <td class="price-td" rowspan="2">¥1,500</td>
          </tr>

          <tr>
            <th class="price-tbody-th">プレミアム</th>
            <td class="price-td">アフターフォローも万全</td>
            <td class="price-td">¥10,000</td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="cta">
      <p class="cta-text">お問い合わせはこちらから</p>
      <a href="/contact" class="cta-button">お問い合わせ</a>
    </div>
  </body>
</html>
