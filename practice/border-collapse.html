<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>練習問題</title>
    <style>
      table {
        border-collapse: collapse;
      }
      td {
        border: 1px solid black;
        padding: 4px;
      }
    </style>
  </head>
  <body>
    <table class="table-before">
      <tr>
        <th>名前</th>
        <th>年齢</th>
      </tr>
      <tr>
        <td>Tanaka</td>
        <td>25</td>
      </tr>
    </table>

    <style>
      .table-before {
        border: 1px solid black;
      }

      .table-before th,
      .table-before td {
        border: 1px solid black;
      }
    </style>

    <table class="table-after">
      <tr>
        <th>名前</th>
        <th>年齢</th>
      </tr>
      <tr>
        <td>Tanaka</td>
        <td>25</td>
      </tr>
    </table>

    <style>
      .table-after {
        border: 1px solid black;
        border-collapse: collapse;
      }

      .table-after th,
      .table-after td {
        border: 1px solid black;
      }
    </style>
  </body>
</html>
